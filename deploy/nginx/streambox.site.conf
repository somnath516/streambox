upstream streambox_app {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name streambox.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name streambox.example.com;

  ssl_certificate /etc/letsencrypt/live/streambox.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/streambox.example.com/privkey.pem;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 600m;
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;
  proxy_request_buffering off;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer always;
  add_header X-Frame-Options SAMEORIGIN always;

  location ~ ^/(video|subtitle|subtitle-card|thumbnail|thumbnail-card|hero-banner)/ {
    proxy_pass http://streambox_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Range $http_range;
    proxy_set_header If-Range $http_if_range;
    proxy_buffering off;
    proxy_force_ranges on;
    add_header Accept-Ranges bytes always;
    expires 1h;
  }

  location ~ ^/(logos|icons)/ {
    proxy_pass http://streambox_app;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
  }

  location /upload {
    proxy_pass http://streambox_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;
    proxy_request_buffering off;
    proxy_buffering off;
  }

  location / {
    proxy_pass http://streambox_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
