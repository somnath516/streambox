<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stream Box Admin</title>
<link rel="icon" type="image/png" sizes="64x64" href="/logos/favicon-64.png">
<link rel="icon" type="image/png" sizes="32x32" href="/logos/favicon-loading-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/logos/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<script src="/favicon.js" defer></script>


<style>
@import url('../netflix-ui.css');

:root {
  --netflix-red: #e50914;
  --bg-main: #0b0b0b;
  --card-bg: rgba(18,18,18,0.9);
  --soft-border: rgba(255,255,255,0.08);
  --admin-ease: cubic-bezier(.16,1,.3,1);
  --admin-fast: 180ms;
  --admin-med: 320ms;
}

/* RESET */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(to bottom, #0b0b0b, #141414);
  color: white;
  font-family: "Segoe UI", system-ui;
  -webkit-font-smoothing: antialiased;
  text-rendering: geometricPrecision;
}

.sidebar {
  position: fixed; left: 0; top: 0; width: 280px; height: 100vh; z-index: 1000;
  background: rgba(15,15,15,0.98);
  padding: 30px 24px;
  border-right: 1px solid var(--soft-border);
  transform: translate3d(-101%, 0, 0);
  transition: transform 360ms var(--admin-ease);
  will-change: transform;
}
.sidebar.open { transform: translate3d(0, 0, 0); }

.sidebar h2 {
  color: var(--netflix-red);
  font-weight: 800;
  margin-bottom: 30px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 32px;
  line-height: 1;
}

.sidebar h2 svg,
.nav-link svg {
  width: 20px;
  height: 20px;
  flex: 0 0 20px;
  shape-rendering: geometricPrecision;
}

.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px; border-radius: 10px;
  margin-bottom: 8px; color: #bbb; text-decoration: none;
  min-height: 48px;
  transition: background var(--admin-fast) var(--admin-ease), color var(--admin-fast) var(--admin-ease), transform var(--admin-fast) var(--admin-ease);
  will-change: transform;
}
.nav-link:hover, .nav-link.active, .nav-link:focus-visible {
  background: var(--netflix-red);
  color: white;
  outline: none;
}
.nav-link:hover, .nav-link:focus-visible {
  transform: translate3d(3px, 0, 0);
}

/* HAMBURGER */
.hamburger {
  position: fixed; left: 20px; top: 20px;
  z-index: 1001;
  background: rgba(20,20,20,0.9);
  border: 1px solid var(--soft-border);
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  transition: background var(--admin-fast) var(--admin-ease), transform var(--admin-fast) var(--admin-ease), border-color var(--admin-fast) var(--admin-ease);
  will-change: transform;
}
.hamburger span {
  display: block;
  width: 22px;
  height: 3px;
  background: white;
  margin: 4px 0;
  border-radius: 999px;
  transition: transform 260ms cubic-bezier(0.22, 0.9, 0.24, 1), opacity 180ms ease;
}

.hamburger[aria-expanded="true"] {
  background: rgba(229,9,20,0.16);
  border-color: rgba(229,9,20,0.45);
}

.hamburger[aria-expanded="true"] span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger[aria-expanded="true"] span:nth-child(2) { opacity: 0; }
.hamburger[aria-expanded="true"] span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.nav-scrim {
  position: fixed;
  inset: 0;
  z-index: 900;
  background: rgba(0,0,0,0.48);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--admin-med) var(--admin-ease);
}

.nav-scrim.show {
  opacity: 1;
  pointer-events: auto;
}

/* MAIN */
.main {
  padding: 90px 40px;
  transition: transform 360ms var(--admin-ease);
  will-change: transform;
}
.main.sidebar-open { transform: translate3d(280px, 0, 0); }

/* TITLE */
.page-title {
  font-size: clamp(2rem, 4vw, 2.5rem);
  font-weight: 900;
  margin-bottom: 30px;
  text-align: center;
}

/* STATS */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--soft-border);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 16px 44px rgba(0,0,0,.24);
  transition: transform var(--admin-med) var(--admin-ease), border-color var(--admin-fast) var(--admin-ease), background var(--admin-fast) var(--admin-ease);
  will-change: transform;
}
.stat-card:hover {
  transform: translate3d(0,-2px,0);
  border-color: rgba(255,255,255,.13);
  background: rgba(22,22,22,.94);
}

.stat-number {
  font-size: 2rem;
  font-weight: 800;
}

.stat-label {
  font-size: 0.9rem;
  color: #aaa;
}

/* SEARCH */
.search-input {
  width: 100%;
  max-width: 400px;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid var(--soft-border);
  background: #141414;
  color: white;
  margin-bottom: 20px;
  transition: border-color var(--admin-fast) var(--admin-ease), box-shadow var(--admin-fast) var(--admin-ease), background var(--admin-fast) var(--admin-ease), transform var(--admin-fast) var(--admin-ease);
}
.search-input:focus {
  outline:none;
  border-color: rgba(229,9,20,.8);
  background:#171717;
  box-shadow:0 0 0 4px rgba(229,9,20,.14);
  transform:translate3d(0,-1px,0);
}

/* TABLE (MINIMAL) */
.table-container {
  background: var(--card-bg);
  border-radius: 16px;
  border: 1px solid var(--soft-border);
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: thin;
  scrollbar-color: rgba(229,9,20,.65) rgba(255,255,255,.08);
  box-shadow: 0 22px 70px rgba(0,0,0,.30);
  -webkit-overflow-scrolling: touch;
}
.table-container::-webkit-scrollbar {
  height: 8px;
}
.table-container::-webkit-scrollbar-track {
  background: rgba(255,255,255,.08);
}
.table-container::-webkit-scrollbar-thumb {
  background: rgba(229,9,20,.65);
  border-radius: 999px;
}

.table {
  width: 100%;
  min-width: 720px;
  border-collapse: collapse;
}

.table th {
  text-align: left;
  padding: 14px;
  font-size: 0.8rem;
  color: #aaa;
  border-bottom: 1px solid var(--soft-border);
}

.table td {
  padding: 16px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.table tr:hover {
  background: rgba(255,255,255,0.03);
}
.table tr {
  transition: background var(--admin-fast) var(--admin-ease), transform var(--admin-fast) var(--admin-ease);
}
.table tbody tr:hover {
  transform: translate3d(2px,0,0);
}

/* ICON BUTTONS */
.action-icon {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:34px;
  height:34px;
  border-radius:10px;
  border:1px solid var(--soft-border);
  background: rgba(255,255,255,0.06);
  color: #fff;
  cursor:pointer;
  transition: background var(--admin-fast) var(--admin-ease), border-color var(--admin-fast) var(--admin-ease), transform var(--admin-fast) var(--admin-ease), box-shadow var(--admin-fast) var(--admin-ease);
  will-change: transform;
}
.action-icon:hover {
  transform: translate3d(0,-1px,0) scale(1.03);
  background: rgba(229,9,20,0.14);
  border-color: rgba(229,9,20,0.35);
  box-shadow: 0 10px 24px rgba(0,0,0,.24);
}
.edit-btn { background: rgba(255,255,255,0.06); }
.delete-btn {
  background: rgba(229,9,20,0.10);
  border-color: rgba(229,9,20,0.25);
}
.delete-btn:hover {
  background: rgba(229,9,20,0.20);
  border-color: rgba(229,9,20,0.45);
}


/* REFRESH */
.refresh-btn {
  margin-top: 20px;
  padding: 14px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: var(--netflix-red);
  font-weight: bold;
  cursor: pointer;
  color:#fff;
  transition: background var(--admin-fast) var(--admin-ease), transform var(--admin-fast) var(--admin-ease), box-shadow var(--admin-fast) var(--admin-ease);
  box-shadow: 0 14px 34px rgba(229,9,20,.22);
}
.refresh-btn:hover {
  background:#ff1e28;
  transform:translate3d(0,-2px,0);
  box-shadow: 0 18px 44px rgba(229,9,20,.32);
}

/* EMPTY */
.empty-state {
  text-align: center;
  padding: 40px;
  color: #777;
}

@media (max-width: 820px) {
  .main {
    padding: 82px 18px 32px;
  }
  .stats-grid {
    gap: 14px;
  }
  .main.sidebar-open {
    transform: translate3d(0, 0, 0);
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 1ms !important;
    transition-duration: 1ms !important;
    scroll-behavior: auto !important;
  }
}

</style>
</head>

<body>

<button class="hamburger" id="hamburger" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="sidebar">
  <span></span><span></span><span></span>
</button>

<div class="nav-scrim" id="navScrim" aria-hidden="true"></div>

<div class="sidebar" id="sidebar">
<h2>
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M4 7.5L12 3l8 4.5-8 4.5-8-4.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
      <path d="M4 12l8 4.5 8-4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M4 16.5l8 4.5 8-4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Admin Panel</span>

  </h2>
  <a href="index.html" class="nav-link">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:0 0 auto;" aria-hidden="true">
      <path d="M4 10.5 12 4l8 6.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M6.5 10.5V20h11V10.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Home</span>
  </a>
  <a href="upload.html" class="nav-link">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:0 0 auto;" aria-hidden="true">
      <path d="M12 16V4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      <path d="M7.5 8.5 12 4l4.5 4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M5 20h14" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
    </svg>
    <span>Upload Movie</span>
  </a>
  <a href="database.html" class="nav-link active">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:0 0 auto;" aria-hidden="true">
      <path d="M6 8c0-1.1 3.1-2 6-2s6 .9 6 2-3.1 2-6 2-6-.9-6-2Z" stroke="currentColor" stroke-width="1.7"/>
      <path d="M6 8v8c0 1.1 3.1 2 6 2s6-.9 6-2V8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      <path d="M6 12c0 1.1 3.1 2 6 2s6-.9 6-2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
    </svg>
    <span>Database</span>
  </a>
</div>

<div class="main" id="main">
  <h1 class="page-title">Movie Database</h1>

  <!-- EDITOR MODAL -->
  <div id="editorModal" style="display:none;position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,.75);backdrop-filter: blur(8px);align-items:center;justify-content:center;padding:22px;">
    <div style="width:min(980px,100%);background:rgba(15,15,15,.96);border:1px solid var(--soft-border);border-radius:18px;padding:18px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;">
        <div style="color:var(--netflix-red);font-weight:900;">Edit Movie</div>
        <button class="action-icon" data-action="closeEditor" title="Close" style="border-color:rgba(255,255,255,.12);" type="button">✕</button>
      </div>

      <div style="display:grid;grid-template-columns: 1fr 1fr;gap:14px;">
        <div>
          <div style="color:#aaa;font-size:.8rem;margin-bottom:8px;">Title</div>
          <input id="editorTitle" class="form-input" style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--soft-border);background:#141414;color:#fff;" />

          <div style="color:#aaa;font-size:.8rem;margin:14px 0 8px;">Description</div>
          <textarea id="editorDescription" class="form-textarea" style="width:100%;min-height:110px;padding:12px;border-radius:10px;border:1px solid var(--soft-border);background:#141414;color:#fff;resize:vertical;"></textarea>

          <div style="color:#aaa;font-size:.8rem;margin:14px 0 8px;">Category</div>
          <input id="editorCategory" class="form-input" style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--soft-border);background:#141414;color:#fff;" />
        </div>

        <div>
          <div style="color:#aaa;font-size:.8rem;margin-bottom:8px;">Previews</div>
          <div style="display:grid;grid-template-columns: 1fr 1fr;gap:12px;align-items:start;">
            <div>
              <div style="color:#aaa;font-size:.75rem;margin-bottom:6px;">Thumbnail</div>
              <img id="previewThumbnail" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="" style="width:100%;height:160px;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:#0b0b0b;" />
              <input type="file" id="thumbnailFile" accept="image/*" style="display:block;margin-top:10px;color:#aaa;width:100%;" />
            </div>
            <div>
              <div style="color:#aaa;font-size:.75rem;margin-bottom:6px;">Hero Banner</div>
              <img id="previewHeroBanner" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="" style="width:100%;height:160px;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:#0b0b0b;" />
              <input type="file" id="heroBannerFile" accept="image/*" style="display:block;margin-top:10px;color:#aaa;width:100%;" />
            </div>
          </div>

          <div style="margin-top:12px;color:#aaa;font-size:.8rem;">Subtitle</div>
          <div id="previewSubtitleName" style="color:#fff;margin-top:6px;font-size:.9rem;">—</div>
          <input type="file" id="subtitleFile" accept=".vtt" style="display:block;margin-top:10px;color:#aaa;width:100%;" />
        </div>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:12px;margin-top:14px;">
        <button class="action-icon" data-action="closeEditor" style="border-color:rgba(255,255,255,.12);" type="button">Cancel</button>
        <button class="action-icon" data-action="saveEditor" style="border-color:rgba(229,9,20,.45);background:rgba(229,9,20,.14);" type="button">Save</button>
      </div>
    </div>
  </div>


  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-number" id="totalMovies">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="completeMovies">0</div>
      <div class="stat-label">Complete</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="missingFiles">0</div>
      <div class="stat-label">Missing</div>
    </div>
  </div>

  <!-- SEARCH -->
  <input type="text" id="searchInput" class="search-input" placeholder="Search movie...">

  <!-- TABLE -->
  <div class="table-container">
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Description</th>
          <th>Category</th>
          <th>Actions</th>

        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

<button class="refresh-btn" data-action="loadDatabase" type="button">Refresh</button>

  <div class="empty-state" id="emptyState" style="display:none;">
    No movies found
  </div>
</div>

<script>
let allMovies = [];
let filteredMovies = [];
const transparentPixel = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==';

function getAdminToken() {
  let token = localStorage.getItem('streamboxAdminToken') || '';
  if (!token) {
    token = window.prompt('Admin token') || '';
    if (token) localStorage.setItem('streamboxAdminToken', token);
  }
  return token;
}

function authHeaders() {
  const token = getAdminToken();
  return token ? { Authorization: `Bearer ${token}` } : {};
}

// SIDEBAR

// Delegate clicks for CSP-safe admin actions
function setupAdminDelegation() {
  document.addEventListener('click', (e) => {
    const btn = e.target && e.target.closest && e.target.closest('[data-action]');
    if (!btn) return;

    const action = btn.getAttribute('data-action');
    const id = btn.getAttribute('data-id');

    if (action === 'openEditor') {
      if (id) openEditor(id);
      return;
    }

    if (action === 'deleteMovie') {
      if (id) deleteMovie(id);
      return;
    }

    if (action === 'closeEditor') {
      closeEditor();
      return;
    }

    if (action === 'saveEditor') {
      saveEditor();
      return;
    }

    if (action === 'loadDatabase') {
      loadDatabase();
      return;
    }
  });
}
const hamburger = document.getElementById('hamburger');
const sidebar = document.getElementById('sidebar');
const main = document.getElementById('main');
const navScrim = document.getElementById('navScrim');

if (hamburger && sidebar && main) {
  const setSidebar = (open) => {
    sidebar.classList.toggle('open', open);
    main.classList.toggle('sidebar-open', open);
    navScrim?.classList.toggle('show', open);
    hamburger.setAttribute('aria-expanded', open ? 'true' : 'false');
    hamburger.setAttribute('aria-label', open ? 'Close navigation' : 'Open navigation');
  };

  hamburger.addEventListener('click', () => setSidebar(!sidebar.classList.contains('open')));
  navScrim?.addEventListener('click', () => setSidebar(false));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') setSidebar(false);
  });
}


// LOAD
async function loadDatabase() {
  const res = await fetch("/movies");
  allMovies = await res.json();
  filteredMovies = [...allMovies];
  render();
  updateStats();
}

function render() {
  const tbody = document.getElementById("tableBody");

  if (!filteredMovies.length) {
    emptyState.style.display = "block";
    return;
  }

  emptyState.style.display = "none";

  tbody.innerHTML = filteredMovies.map(m => `
    <tr>
      <td>${m.id}</td>
      <td>${m.title}</td>
      <td>${m.description || "-"}</td>
      <td>${m.category || "Movie"}</td>
      <td>
        <button class="action-icon edit-btn" title="Edit" data-action="openEditor" data-id="${m.id}">

          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 20h9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4 11.5-11.5z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="action-icon delete-btn" title="Delete" data-action="deleteMovie" data-id="${m.id}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 6h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M8 6V4h8v2" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M6 6l1 16h10l1-16" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            <path d="M10 11v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M14 11v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </td>

    </tr>
  `).join('');
}

function updateStats() {
  totalMovies.textContent = allMovies.length;
  completeMovies.textContent = allMovies.filter(m=>m.movie && m.thumbnail).length;
  missingFiles.textContent = allMovies.length - completeMovies.textContent;
}

// SEARCH
searchInput.oninput = e => {
  const q = e.target.value.toLowerCase();
  filteredMovies = allMovies.filter(m => m.title.toLowerCase().includes(q));
  render();
};

// DELETE
async function deleteMovie(id) {
  if (!confirm("Delete?")) return;
  await fetch(`/movies/${id}`, { method: "DELETE", headers: authHeaders() });
  loadDatabase();
}

// EDITOR MODAL (inline editing freedom)
let activeEditId = null;

function openEditor(id) {
  activeEditId = id;
  const movie = allMovies.find(m => String(m.id) === String(id));
  if (!movie) return;

  document.getElementById('editorTitle').value = movie.title || '';
  document.getElementById('editorDescription').value = movie.description || '';
  document.getElementById('editorCategory').value = movie.category || 'Movie';

  // previews
  const thumbImg = document.getElementById('previewThumbnail');
  const heroImg = document.getElementById('previewHeroBanner');
  const subName = document.getElementById('previewSubtitleName');

  thumbImg.src = movie.thumbnail ? ('/thumbnail/' + movie.thumbnail) : transparentPixel;
  heroImg.src = movie.heroBanner ? ('/hero-banner/' + movie.heroBanner) : transparentPixel;
  subName.textContent = movie.subtitle || '—';

  // clear inputs
  document.getElementById('thumbnailFile').value = '';
  document.getElementById('heroBannerFile').value = '';
  document.getElementById('subtitleFile').value = '';

  document.getElementById('editorModal').style.display = 'flex';
}

function closeEditor() {
  document.getElementById('editorModal').style.display = 'none';
  activeEditId = null;
}

// live preview for selected files
['thumbnailFile','heroBannerFile','subtitleFile'].forEach(id => {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('change', () => {
    const thumbImg = document.getElementById('previewThumbnail');
    const heroImg = document.getElementById('previewHeroBanner');
    if (id === 'thumbnailFile' && thumbImg) {
      const f = el.files?.[0];
      thumbImg.src = f ? URL.createObjectURL(f) : transparentPixel;
    }
    if (id === 'heroBannerFile' && heroImg) {
      const f = el.files?.[0];
      heroImg.src = f ? URL.createObjectURL(f) : transparentPixel;
    }
  });
});


async function uploadAndSaveFile(fieldname, file, previewEl, endpointField) {
  if (!file) return null;
  // Reuse /upload endpoint by sending minimal form with existing required movie upload? 
  // Instead: use /upload with dummy movie isn't allowed.
  // Therefore we upload file directly by PATCHing with stored filename is not possible without backend route.
  // Fallback: if no backend direct upload route exists, we keep edit fields text-only.
  return null;
}

async function saveEditor() {
  const id = activeEditId;
  if (!id) return;

  const formData = new FormData();
  formData.append('title', document.getElementById('editorTitle').value);
  formData.append('description', document.getElementById('editorDescription').value);
  formData.append('category', document.getElementById('editorCategory').value);

  const thumbFileInput = document.getElementById('thumbnailFile');
  const heroFileInput = document.getElementById('heroBannerFile');
  const subtitleInput = document.getElementById('subtitleFile');

  if (thumbFileInput?.files?.[0]) formData.append('thumbnail', thumbFileInput.files[0]);
  if (heroFileInput?.files?.[0]) formData.append('heroBanner', heroFileInput.files[0]);
  if (subtitleInput?.files?.[0]) formData.append('subtitle', subtitleInput.files[0]);

  // DEBUG
  try {
    console.log('🛠 saveEditor FormData entries:');
    for (const [k, v] of formData.entries()) {
      console.log('  ', k, v && v.name ? v.name : typeof v);
    }
  } catch {}

  try {
    const res = await fetch(`/movies/${id}`, {
      method: 'PATCH',
      headers: authHeaders(),
      body: formData
    });

    const status = res.status;
    const text = await res.text().catch(() => '');

    if (!res.ok) {
      alert('Save failed' + (text ? `: ${text}` : ''));
      return;
    }

    console.log('🛠 PATCH response status:', status);
    console.log('🛠 PATCH response text:', text);

    closeEditor();
    loadDatabase();
  } catch (e) {
    console.error('Save failed client error:', e);
    alert('Save failed');
  }
}





// INIT
window.onload = loadDatabase;
</script>
