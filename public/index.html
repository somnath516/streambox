<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stream Box</title>
<link rel="icon" type="image/png" sizes="64x64" href="/logos/favicon-64.png">
<link rel="icon" type="image/png" sizes="32x32" href="/logos/favicon-loading-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/logos/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<script src="/favicon.js" defer></script>



<style>
:root{
  --red:#E50914;
  --bg:#141414;
  --grey:#b3b3b3;

  /* Unified OTT brand tokens */
  --brand-gap:8px;
  --brand-gap-lg:12px;
  --brand-radius:12px;
  --brand-blur:10px;
  --brand-transition:260ms;
  --brand-ease:cubic-bezier(.22,.9,.24,1);
  --brand-overlay-bg:rgba(0,0,0,0.26);
  --brand-overlay-shadow:0 12px 34px rgba(0,0,0,0.28);
  --brand-text-spacing:0.2px;
  --brand-nav-opacity:0.85;
  --brand-hover-opacity:1;
  --motion-fast:180ms;
  --motion-med:320ms;
  --motion-slow:620ms;
  --motion-cinema:cubic-bezier(.16,1,.3,1);
}


*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--bg);
  color:#fff;
  font-family:"Segoe UI",sans-serif;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:geometricPrecision;
}

body.nav-open{
  overflow:hidden;
}

/* LOADER */
#loading{
  position:fixed;inset:0;
  background:var(--red);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;
  transition:opacity var(--motion-slow) var(--motion-cinema), transform var(--motion-slow) var(--motion-cinema);
  will-change:opacity, transform;
}
#loading.fade-out{opacity:0;pointer-events:none;transform:scale(1.015)}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:14px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(to bottom, rgba(0,0,0,.92), rgba(0,0,0,.18) 78%, transparent);
  z-index:1000;
  transition:background var(--motion-med) var(--motion-cinema), transform var(--motion-med) var(--motion-cinema);
  will-change:background, transform;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:18px;
}



.logo{
  color:var(--red);
  font-size:1.8rem;
  font-weight:900;
}

.nav-logo{
  height:32px;
  width:auto;
  object-fit:contain;
  display:block;
  image-rendering:auto;
  transform:translateZ(0);
}
@media (max-width: 600px){
  .nav-logo{ height:32px; }
}



.brand-unit{
  display:flex;
  align-items:center;
  gap:var(--brand-gap-lg);
}





.nav-links span{
  margin-right:22px;
  color:#cfcfcf;
  font-size:.95rem;
  cursor:pointer;
  transition:opacity var(--brand-transition) var(--brand-ease), color var(--brand-transition) var(--brand-ease), transform var(--brand-transition) var(--brand-ease);
  letter-spacing:0.05px;
  opacity:var(--brand-nav-opacity);
  }

.nav-links span:hover{
  color:#fff;
  transform:translate3d(0,-1px,0);
}

.menu-btn{
  display:none;
  width:38px;
  height:38px;
  border:0;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  color:#fff;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:background var(--motion-fast) var(--motion-cinema), transform var(--motion-fast) var(--motion-cinema), opacity var(--motion-fast) var(--motion-cinema);
  will-change:transform;
}

.menu-btn:hover{ background:rgba(255,255,255,.18); }
.menu-btn:active{ transform:scale(.94); }
.menu-btn svg{
  width:21px;
  height:21px;
  stroke:currentColor;
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
}

.nav-scrim{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.58);
  opacity:0;
  pointer-events:none;
  transition:opacity var(--motion-med) var(--motion-cinema);
  z-index:950;
}

/* RIGHT NAV */
.nav-right{
  display:flex;
  gap:14px;
}

.icon-btn{
  width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.08);
  border:0;
  border-radius:50%;
  color:#fff;
  cursor:pointer;
  transition:background var(--motion-fast) var(--motion-cinema), transform var(--motion-fast) var(--motion-cinema), opacity var(--motion-fast) var(--motion-cinema);
  will-change:transform;
}
.icon-btn:hover{
  background:rgba(255,255,255,.2);
  transform:translate3d(0,-1px,0) scale(1.035);
}
.icon-btn:active{
  transform:scale(.94);
}

/* FIXED SVG */
.icon-btn svg{
  width:18px;
  height:18px;
  stroke:#fff;
  fill:none;
  stroke-width:2;
}

/* HERO */
.hero{
  height:89vh;
  min-height:670px;
  position:relative;
  overflow:hidden;
}



.hero video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero::after{
  content:'';
  position:absolute;
  inset:0;
  z-index:1;

  /* Full-width + full-height coverage with bottom fade that doesn’t leave gaps.
     Keep it subtle to preserve poster detail. */
  background:
    radial-gradient(900px 520px at 18% 52%, rgba(0,0,0,0.08), rgba(0,0,0,0.70) 70%),
    linear-gradient(to right, rgba(0,0,0,.78) 0%, rgba(0,0,0,.22) 45%, rgba(0,0,0,.08) 80%),
    linear-gradient(to top, rgba(20,20,20,.75) 0%, rgba(20,20,20,0) 55%),

    /* Bottom overlay: ensure coverage LEFT→RIGHT and bottom area is always masked. */
    linear-gradient(to bottom, rgba(0,0,0,.66) 0%, rgba(0,0,0,.18) 55%, rgba(0,0,0,0) 100%),

    rgba(0,0,0,0.10);

  pointer-events:none;
}


/* Keep hero background images behind the overlay to avoid edge gaps */
.hero-background{
  z-index:0;
}

#heroImgA,
#heroImgB{
  z-index:0;
}

.hero-content{
  z-index:2;
}



/* balance hero composition */
.hero-background img{
  filter: saturate(0.95) contrast(1.05);
}

/* Cinematic hero imgs */
.hero-img{
  transform:scale(1.02);
  will-change:transform, opacity;
  backface-visibility:hidden;
}
.hero-img.active{
  animation:heroKenBurns 16s var(--motion-cinema) infinite;
}

@keyframes heroKenBurns{
  0%{ transform:scale(1.02) translate3d(0,0,0); }
  50%{ transform:scale(1.055) translate3d(-0.8%, -0.6%, 0); }
  100%{ transform:scale(1.02) translate3d(0,0,0); }
}

.hero-content{
  position:absolute;
  top:50%;
  left:60px;
  transform:translateY(-70%);
  max-width:400px;
  z-index:2;
  opacity:0;
  animation:heroContentIn .72s var(--motion-cinema) .12s forwards;
  will-change:opacity, transform;
}

@keyframes heroContentIn{
  from{ opacity:0; transform:translate3d(0,-62%,0); }
  to{ opacity:1; transform:translate3d(0,-70%,0); }
}


.hero-title{
  font-size:3rem;
  font-weight:900;
  letter-spacing:0;
  line-height:1.05;
  text-shadow:0 12px 42px rgba(0,0,0,.55);
}

.hero-desc{
  color:#ddd;
  margin:15px 0;
  line-height:1.45;
}

.hero-buttons{
  display:flex;
  gap:12px;
}

.btn{
  padding:10px 22px;
  border:none;
  font-weight:600;
  cursor:pointer;
  border-radius:4px;
  transition:background var(--motion-fast) var(--motion-cinema), transform var(--motion-fast) var(--motion-cinema), opacity var(--motion-fast) var(--motion-cinema), box-shadow var(--motion-fast) var(--motion-cinema);
  will-change:transform;
}
.btn:hover{ transform:translate3d(0,-2px,0) scale(1.025); }
.btn:active{ transform:scale(.97); }

.btn-play{
  background:white;
  color:black;
}
.btn-play:hover{background:#ddd;}

.btn-info{
  background:rgba(109,109,110,.6);
}
.btn-info:hover{background:rgba(109,109,110,.85);}

/* SECTIONS */
.section{
  padding:26px 40px;
  content-visibility:auto;
  contain-intrinsic-size:360px;
}

.section-title{
  font-size:1.2rem;
  margin-bottom:10px;
  letter-spacing:.01em;
  transition:color var(--motion-fast) var(--motion-cinema), transform var(--motion-fast) var(--motion-cinema);
}

/* hide empty rows without placeholders */
.section.is-empty{ display:none; }

/* ROW (Netflix-style carousel) */
.row{
  display:flex;
  gap:14px;
  overflow-x:auto;
  overflow-y:visible;
  padding:14px 0 18px;
  scroll-snap-type:x proximity;
  scroll-behavior:smooth;
  scrollbar-width:none;
  overscroll-behavior-inline:contain;
  -webkit-overflow-scrolling:touch;
}
.row::-webkit-scrollbar{display:none}

.row > .card{
  scroll-snap-align:start;
}

/* CARD */
.card{
  min-width:180px;
  transition:transform var(--motion-med) var(--motion-cinema), opacity var(--motion-med) var(--motion-cinema);
  cursor:pointer;
  position:relative;
  transform:translateZ(0);
  will-change:transform;
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
  border-radius:4px;
  box-shadow:0 10px 28px rgba(0,0,0,.28);
  background:#111;
}

/* subtle premium hover */
.card:hover{
  transform: translate3d(0,-10px,0) scale(1.045);
  z-index:50;
}

.card img{
  transition: transform var(--motion-slow) var(--motion-cinema), filter var(--motion-med) var(--motion-cinema), box-shadow var(--motion-med) var(--motion-cinema), opacity var(--motion-med) var(--motion-cinema);
  will-change:transform;
}

.card:hover img{
  filter: brightness(1.12) contrast(1.06);
  transform: scale(1.05);
  box-shadow:0 22px 54px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.12);
}

.card p{
  font-size:.85rem;
  margin-top:6px;
  color:#ccc;
  opacity:.86;
  transform:translate3d(0,0,0);
  transition:color var(--motion-fast) var(--motion-cinema), opacity var(--motion-fast) var(--motion-cinema), transform var(--motion-fast) var(--motion-cinema);
}
.card:hover p{
  color:#fff;
  opacity:1;
  transform:translate3d(0,-1px,0);
}

.card:focus-visible,
.card.focused{
  outline:2px solid rgba(255,255,255,.94);
  outline-offset:4px;
  transform:translate3d(0,-10px,0) scale(1.045);
}

/* SEARCH */
#searchOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.96);
  display:none;
  flex-direction:column;
  padding:40px;
  z-index:3000;
  opacity:0;
  transform:translateY(8px);
  transition:opacity var(--motion-med) var(--motion-cinema), transform var(--motion-med) var(--motion-cinema);
  will-change:opacity, transform;
}

#searchOverlay.show {
  opacity:1;
  transform:translateY(0);
}

#searchBox{
  padding:16px;
  font-size:18px;
  margin-bottom:20px;
  background:#222;
  border:none;
  color:#fff;
  outline:none;
}

#searchResults{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.close-btn{
  margin-bottom:15px;
  cursor:pointer;
  color:#ccc;
}
.close-btn:hover{color:#fff}

@media (max-width: 820px){
  .navbar{
    padding:12px 18px;
    background:rgba(0,0,0,.86);
    backdrop-filter:blur(14px);
  }

  .nav-left{ gap:12px; }
  .menu-btn{ display:flex; }
  .brand-unit .logo{ display:none; }

  .nav-links{
    position:fixed;
    top:0;
    left:0;
    width:min(82vw, 320px);
    height:100vh;
    padding:88px 24px 24px;
    display:flex;
    flex-direction:column;
    gap:6px;
    background:linear-gradient(180deg, rgba(18,18,18,.98), rgba(9,9,9,.96));
    border-right:1px solid rgba(255,255,255,.12);
    box-shadow:24px 0 55px rgba(0,0,0,.44);
    transform:translateX(-104%);
  transition:transform var(--motion-med) var(--motion-cinema);
  will-change:transform;
    z-index:1100;
  }

  .nav-links span{
    margin:0;
    padding:14px 4px;
    font-size:1.05rem;
    opacity:.92;
  }

  body.nav-open .nav-links{
    transform:translateX(0);
  }

  body.nav-open .nav-scrim{
    opacity:1;
    pointer-events:auto;
  }

  .hero{
    min-height:560px;
  }

  .hero-content{
    left:24px;
    right:24px;
    top:58%;
    transform:translateY(-60%);
    max-width:none;
  }
  @keyframes heroContentIn{
    from{ opacity:0; transform:translate3d(0,-52%,0); }
    to{ opacity:1; transform:translate3d(0,-60%,0); }
  }

  .hero-title{
    font-size:clamp(2rem, 10vw, 3rem);
  }

  .section{
    padding:22px 18px;
  }
}

@media (prefers-reduced-motion: reduce){
  *,
  *::before,
  *::after{
    animation-duration:.001ms !important;
    animation-iteration-count:1 !important;
    scroll-behavior:auto !important;
    transition-duration:.001ms !important;
  }
}

</style>
</head>

<body>

<div id="loading">Loading...</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <div class="brand-unit">
<img class="nav-logo nav-logo--main" src="/logos/logo master.png" alt="Stream Box">
      <div class="logo"><span style="color:#fff;">Stream</span><span style="color:var(--red);">Box</span></div>
    </div>

    <button class="menu-btn" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="navLinks">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 7h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 17h16"></path>
      </svg>
    </button>

    <div class="nav-links" id="navLinks">
      <span>Home</span>
      <span>TV Shows</span>
      <span>Movies</span>
      <span>New & Popular</span>
      <span>My List</span>
    </div>
  </div>

  <div class="nav-right">
    <!-- SEARCH -->
    <button class="icon-btn" type="button" aria-label="Search">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M10.8 18.1a7.3 7.3 0 1 1 5.2-2.1"></path>
        <path d="M16.2 16.2 21 21"></path>
      </svg>
    </button>

    <!-- ADMIN -->
    <button class="icon-btn" type="button" aria-label="Admin">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3.5 19 7v5.4c0 4.2-2.8 7.9-7 9.1-4.2-1.2-7-4.9-7-9.1V7l7-3.5Z"></path>
        <path d="M9.2 12.2 11.2 14.2 15.2 9.8"></path>
      </svg>
    </button>
  </div>
</div> <!-- ✅ FIXED: NAVBAR CLOSED -->

<div class="nav-scrim" aria-hidden="true"></div>

<!-- HERO -->
<div class="hero">
  <div class="hero-background" style="position:absolute;inset:0;">
    <img id="heroImgA" class="hero-img active" alt="Hero Background A" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" decoding="async" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:1;transition:opacity 0.6s ease;">
    <img id="heroImgB" class="hero-img" alt="Hero Background B" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" decoding="async" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.6s ease;">
  </div>

  <div class="hero-content">

    <h1 id="heroTitle" class="hero-title">Loading...</h1>
    <p id="heroDesc" class="hero-desc"></p>

    <div class="hero-buttons">
      <button class="btn btn-play" data-action="playFeatured" type="button">Play</button>
      <button class="btn btn-info">More Info</button>
    </div>
  </div>
</div>

<!-- SEARCH -->
<div id="searchOverlay">
  <div class="close-btn">← Back</div>
  <input id="searchBox" placeholder="Search movies...">
  <div id="searchResults"></div>
</div>

<!-- SECTIONS -->
<div class="section">
  <h2 class="section-title">Today's Top Picks for You</h2>
  <div class="row" id="movies"></div>
</div>

<div class="section">
  <h2 class="section-title">Trending Now</h2>
  <div class="row" id="trending"></div>
</div>

<div class="section">
  <h2 class="section-title">Continue Watching</h2>
  <div class="row" id="continue"></div>
</div>

<script src="/index.js" defer></script>

</body>
</html>
