<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stream Box Admin</title>
<link rel="icon" type="image/png" sizes="64x64" href="/logos/favicon-64.png">
<link rel="icon" type="image/png" sizes="32x32" href="/logos/favicon-loading-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/logos/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<script src="/favicon.js" defer></script>


<style>
@import url('../netflix-ui.css');

:root {
  --netflix-red: #e50914;
  --bg-main: #0b0b0b;
  --card-bg: rgba(18,18,18,0.9);
  --soft-border: rgba(255,255,255,0.08);
  --admin-ease: cubic-bezier(.16,1,.3,1);
  --admin-fast: 180ms;
  --admin-med: 320ms;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(to bottom, #0b0b0b, #141414);
  color: white;
  font-family: "Segoe UI", system-ui;
  -webkit-font-smoothing: antialiased;
  text-rendering: geometricPrecision;
}

.sidebar {
  position: fixed; left: 0; top: 0; width: 280px; height: 100vh; z-index: 1000;
  background: rgba(15,15,15,0.96);
  padding: 30px 24px;
  border-right: 1px solid var(--soft-border);
  transform: translate3d(-101%, 0, 0);
  transition: transform 360ms var(--admin-ease);
  will-change: transform;
  box-shadow: inset -1px 0 0 rgba(255,255,255,0.03), 0 12px 40px rgba(0,0,0,0.35);
}
.sidebar.open {
  transform: translate3d(0, 0, 0);
}

.sidebar h2 {
  color: var(--netflix-red);
  font-weight: 800;
  margin-bottom: 30px;
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 32px;
  line-height: 1;
}

.sidebar h2 svg,
.nav-link svg {
  width: 20px;
  height: 20px;
  flex: 0 0 20px;
  shape-rendering: geometricPrecision;
}

.nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-radius: 10px;
  margin-bottom: 8px;
  color: #bbb;
  text-decoration: none;
  min-height: 48px;
  transition: background var(--admin-fast) var(--admin-ease), color var(--admin-fast) var(--admin-ease), transform var(--admin-fast) var(--admin-ease);
  will-change: transform;
}

.nav-link:hover,
.nav-link.active,
.nav-link:focus-visible {
  background: var(--netflix-red);
  color: white;
  outline: none;
}

.nav-link:hover,
.nav-link:focus-visible {
  transform: translate3d(3px, 0, 0);
}

.hamburger {
  position: fixed; left: 20px; top: 20px;
  z-index: 1001;
  background: rgba(20,20,20,0.9);
  border: 1px solid var(--soft-border);
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  transition: background var(--admin-fast) var(--admin-ease), transform var(--admin-fast) var(--admin-ease), border-color var(--admin-fast) var(--admin-ease);
  will-change: transform;
}

.hamburger span {
  display: block;
  width: 22px;
  height: 3px;
  background: white;
  margin: 4px 0;
  border-radius: 999px;
  transition: transform 260ms cubic-bezier(0.22, 0.9, 0.24, 1), opacity 180ms ease;
}

.hamburger[aria-expanded="true"] {
  background: rgba(229,9,20,0.16);
  border-color: rgba(229,9,20,0.45);
}

.hamburger[aria-expanded="true"] span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger[aria-expanded="true"] span:nth-child(2) { opacity: 0; }
.hamburger[aria-expanded="true"] span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.nav-scrim {
  position: fixed;
  inset: 0;
  z-index: 900;
  background: rgba(0,0,0,0.48);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--admin-med) var(--admin-ease);
}

.nav-scrim.show {
  opacity: 1;
  pointer-events: auto;
}

.main {
  padding: 90px 40px;
  transition: transform 360ms var(--admin-ease);
  will-change: transform;
}

.main.sidebar-open {
  transform: translate3d(280px, 0, 0);
}

.page-title {
  font-size: clamp(2rem, 4vw, 2.5rem);
  font-weight: 900;
  margin-bottom: 30px;
  letter-spacing: 0;
}

.upload-card {
  max-width: 650px;
  margin: auto;
  background: var(--card-bg);
  padding: clamp(26px, 4vw, 40px);
  border-radius: 20px;
  border: 1px solid var(--soft-border);
  box-shadow: 0 22px 70px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.04);
  transition: transform var(--admin-med) var(--admin-ease), border-color var(--admin-med) var(--admin-ease), box-shadow var(--admin-med) var(--admin-ease);
  will-change: transform;
}
.upload-card:hover {
  transform: translate3d(0,-2px,0);
  border-color: rgba(255,255,255,.12);
  box-shadow: 0 28px 82px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.05);
}

.form-group {
  margin-bottom: 24px;
}

.form-label {
  font-size: 0.8rem;
  color: #aaa;
  margin-bottom: 8px;
  display: block;
  letter-spacing: .04em;
  text-transform: uppercase;
}

.form-input,
.form-textarea {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid var(--soft-border);
  background: #141414;
  color: white;
  transition: border-color var(--admin-fast) var(--admin-ease), box-shadow var(--admin-fast) var(--admin-ease), background var(--admin-fast) var(--admin-ease), transform var(--admin-fast) var(--admin-ease);
}

.form-input:focus,
.form-textarea:focus {
  border-color: var(--netflix-red);
  outline: none;
  background:#171717;
  box-shadow: 0 0 0 4px rgba(229,9,20,.14);
  transform: translate3d(0,-1px,0);
}

.form-textarea {
  min-height: 100px;
}

.file-btn {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  background: #141414;
  border: 1px dashed #333;
  text-align: center;
  color: #888;
  transition: color var(--admin-fast) var(--admin-ease), border-color var(--admin-fast) var(--admin-ease), background var(--admin-fast) var(--admin-ease), transform var(--admin-fast) var(--admin-ease);
}

.file-btn:hover {
  border-color: var(--netflix-red);
  color: white;
  background: rgba(229,9,20,.08);
  transform: translate3d(0,-1px,0);
}

.file-btn.has-file {
  border: 1px solid var(--netflix-red);
  color: white;
}

.file-info {
  font-size: 0.8rem;
  margin-top: 6px;
  color: #777;
  display: none;
}

.file-info.show {
  display: block;
}

.preview-section {
  margin-top: 20px;
  text-align: center;
}

#previewImg {
  max-width: 100%;
  border-radius: 12px;
  display: none;
}

.upload-btn {
  width: 100%;
  padding: 16px;
  margin-top: 25px;
  background: var(--netflix-red);
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  color:#fff;
  box-shadow:0 14px 34px rgba(229,9,20,.24);
  transition: background var(--admin-fast) var(--admin-ease), transform var(--admin-fast) var(--admin-ease), box-shadow var(--admin-fast) var(--admin-ease);
  will-change:transform;
}

.upload-btn:hover {
  background: #ff1e28;
  transform: translate3d(0,-2px,0) scale(1.01);
  box-shadow:0 18px 44px rgba(229,9,20,.34);
}
.upload-btn:active {
  transform: scale(.98);
}

.status {
  margin-top: 15px;
  text-align: center;
}

.status.success { color: #46d369; }
.status.error { color: #ff4d4d; }
.status.loading { color: var(--netflix-red); }

@media (max-width: 820px) {
  .main {
    padding: 82px 18px 32px;
  }
  .upload-card {
    border-radius: 16px;
  }
  .main.sidebar-open {
    transform: translate3d(0, 0, 0);
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 1ms !important;
    transition-duration: 1ms !important;
    scroll-behavior: auto !important;
  }
}

</style>
</head>

<body>

  <span></span>

</button>

<div class="nav-scrim" id="navScrim" aria-hidden="true"></div>

  <h2>

      <path d="M4 7.5L12 3l8 4.5-8 4.5-8-4.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>

  </h2>

    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:0 0 auto;" aria-hidden="true">

</div>

<div class="main" id="main">
  <h1 class="page-title">Upload New Movie</h1>

  <div class="upload-card">

    <div class="form-group">
      <label class="form-label">Movie Title</label>
      <input type="text" class="form-input" id="title">
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>

    </div>

    <div class="form-group">
      <label class="form-label">Movie File</label>
      <div class="file-input-wrapper" data-target="movieFile">
        <input type="file" id="movieFile">

      <div id="movieFileInfo" class="file-info"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Subtitle</label>
      <div class="file-input-wrapper" data-target="subtitleFile">
        <input type="file" id="subtitleFile">
        <div class="file-btn">Select Subtitle</div>
      </div>

    </div>

    <div class="form-group">
      <label class="form-label">Thumbnail</label>
      <div class="file-input-wrapper" data-target="thumbnailFile">
        <input type="file" id="thumbnailFile">
        <div class="file-btn">Select Image</div>
      </div>
      <div id="thumbnailFileInfo" class="file-info"></div>
    </div>

    <!-- NEW: Hero Banner Image upload -->
    <div class="form-group">
      <label class="form-label">Hero Banner (Wide)</label>
      <div class="file-input-wrapper" data-target="heroBannerFile">
        <input type="file" id="heroBannerFile" accept="image/*">
        <div class="file-btn">Select Hero Banner</div>
      </div>
      <div id="heroBannerFileInfo" class="file-info"></div>
    </div>


    <div class="preview-section">
      <img id="previewImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="">
    </div>

    <button class="upload-btn" id="uploadBtn">Upload Movie</button>
    <div id="status" class="status"></div>

    <!-- upload loading bar (only during upload) -->
    <div id="uploadLoading" style="display:none;margin-top:16px;">
      <div style="height:10px;border-radius:10px;background:rgba(255,255,255,0.08);overflow:hidden;">
        <div id="uploadProgressFill" style="height:100%;width:0%;background:var(--netflix-red);transition:width 0.1s linear;"></div>
      </div>
      <div id="uploadProgressText" style="margin-top:8px;color:#ccc;font-size:0.9rem;">Uploading... 0%</div>
    </div>

    <!-- right-side upload ETA panel (kept minimal; does not affect left progress UI) -->
    <div id="etaPanel" style="display:none;margin-top:18px;padding:14px 16px;border-radius:14px;background:rgba(0,0,0,0.25);border:1px solid var(--soft-border);backdrop-filter: blur(10px);">
      <div style="display:flex;align-items:baseline;justify-content:space-between;gap:10px;">
          <div style="display:flex;align-items:center;gap:10px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <svg id="etaClockIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:0 0 auto;opacity:0.95;">
              <path d="M12 8V12L14.5 13.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="currentColor" stroke-width="2"/>
            </svg>
            <div style="color:#fff;font-weight:700;letter-spacing:0.2px;">Estimated Time</div>
          </div>
        </div>
        <div id="etaCountdown" style="color:var(--netflix-red);font-weight:800;letter-spacing:0.3px;">--:--</div>
      </div>

        <div style="display:flex;align-items:center;gap:10px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:0 0 auto;opacity:0.95;">
            <path d="M12 2C6.477 2 2 6.477 2 12C2 17.523 6.477 22 12 22C17.523 22 22 17.523 22 12C22 6.477 17.523 2 12 2Z" stroke="currentColor" stroke-width="2" opacity="0.35"/>
            <path d="M12 7V12L15 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M7 14.5C8.2 16.2 10 17 12 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
          </svg>

        </div>

      </div>
      <div id="etaStatus" style="margin-top:8px;color:#888;font-size:0.8rem;display:flex;align-items:center;gap:8px;">
        <svg id="etaStatusIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex:0 0 auto;opacity:0.85;">
          <path d="M12 22C17.523 22 22 17.523 22 12C22 6.477 17.523 2 12 2C6.477 2 2 6.477 2 12C2 17.523 6.477 22 12 22Z" stroke="currentColor" stroke-width="2" opacity="0.35"/>
          <path d="M12 7V12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 16.5H12.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span id="etaStatusText" style="display:inline;">Uploading...</span>
      </div>
    </div>


  </div>

<script>
// SIDEBAR
const hamburger = document.getElementById('hamburger');
const sidebar = document.getElementById('sidebar');
const main = document.getElementById('main');
const navScrim = document.getElementById('navScrim');

function setSidebar(open) {
  sidebar.classList.toggle('open', open);
  main.classList.toggle('sidebar-open', open);
  navScrim.classList.toggle('show', open);
  hamburger.setAttribute('aria-expanded', open ? 'true' : 'false');
  hamburger.setAttribute('aria-label', open ? 'Close navigation' : 'Open navigation');
}

hamburger.onclick = () => setSidebar(!sidebar.classList.contains('open'));
navScrim.onclick = () => setSidebar(false);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') setSidebar(false);
});

// FILE HANDLING
const title = document.getElementById('title');
const desc = document.getElementById('desc');
const movieFile = document.getElementById('movieFile');
const subtitleFile = document.getElementById('subtitleFile');
const thumbnailFile = document.getElementById('thumbnailFile');
const heroBannerFile = document.getElementById('heroBannerFile'); // NEW
const uploadBtn = document.getElementById('uploadBtn');
const status = document.getElementById('status');
const previewImg = document.getElementById('previewImg');

function getAdminToken() {
  let token = localStorage.getItem('streamboxAdminToken') || '';
  if (!token) {
    token = window.prompt('Admin token') || '';
    if (token) localStorage.setItem('streamboxAdminToken', token);
  }
  return token;
}

document.querySelectorAll('.file-input-wrapper').forEach(wrapper => {
  const input = wrapper.querySelector('input');
  const btn = wrapper.querySelector('.file-btn');
  const info = document.getElementById(wrapper.dataset.target + "Info");

  wrapper.onclick = () => input.click();

  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;

    // Client validation
    if (wrapper.dataset.target === "movieFile" && !file.type.startsWith('video/')) {
      status.innerText = "Movie must be video file";
      status.className = "status error";
      return;
    }
    if (wrapper.dataset.target === "subtitleFile" && !file.name.toLowerCase().endsWith('.vtt')) {
      status.innerText = "Subtitle must be .vtt";
      status.className = "status error";
      return;
    }

    btn.classList.add('has-file');
    btn.innerText = file.name;
    info.innerText = file.name;
    info.classList.add('show');

    if (wrapper.dataset.target === "thumbnailFile") {
      previewImg.src = URL.createObjectURL(file);
      previewImg.style.display = "block";
    }
  };
});

// ✅ FIXED UPLOAD HANDLER (with real upload progress)
uploadBtn.onclick = () => {
  const uploadLoading = document.getElementById('uploadLoading');
  const uploadProgressFill = document.getElementById('uploadProgressFill');
  const uploadProgressText = document.getElementById('uploadProgressText');

  if (!movieFile.files?.[0]) {
    status.innerText = 'Select a movie file first';
    status.className = 'status error';
    return;
  }

  const formData = new FormData();
  formData.append('title', title.value);
  formData.append('description', desc.value);
  formData.append('movie', movieFile.files[0]);
  if (thumbnailFile.files?.[0]) formData.append('thumbnail', thumbnailFile.files[0]);

  // Optional: Hero Banner (wide image)
  if (heroBannerFile?.files?.[0]) {
    formData.append('heroBanner', heroBannerFile.files[0]);
  }

  if (subtitleFile.files[0]) {
    formData.append('subtitle', subtitleFile.files[0]);
  }

  status.innerText = 'Uploading...';
  status.className = 'status loading';

  if (uploadLoading) uploadLoading.style.display = 'block';
  if (uploadProgressFill) uploadProgressFill.style.width = '0%';
  if (uploadProgressText) uploadProgressText.textContent = 'Uploading... 0%';

  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/upload');
  const adminToken = getAdminToken();
  if (!adminToken) {
    status.innerText = 'Admin token required';
    status.className = 'status error';
    return;
  }
  xhr.setRequestHeader('Authorization', `Bearer ${adminToken}`);
  // prevent premature client-side aborts for large uploads
  xhr.timeout = 1000 * 60 * 60; // 1 hour

  // Right-side ETA (minimal; does not touch left progress UI)

  const etaPanel = document.getElementById('etaPanel');
  const etaCountdownEl = document.getElementById('etaCountdown');
  const etaSpeedEl = document.getElementById('etaSpeed');
  const etaStatusEl = document.getElementById('etaStatus');
  const etaStatusTextEl = document.getElementById('etaStatusText');
  const etaStatusIconEl = document.getElementById('etaStatusIcon');


  let uploadStartTs = null;

  function formatMMSS(totalSeconds) {
    const seconds = Number.isFinite(totalSeconds) ? totalSeconds : 0;
    const clamped = Math.max(0, Math.floor(seconds));

    const minutes = Math.floor(clamped / 60)
      .toString()
      .padStart(2, '0');

    const secs = Math.floor(clamped % 60)
      .toString()
      .padStart(2, '0');

    return `${minutes}:${secs}`;
  }

  function bytesToMB(b) {
    return b / (1024 * 1024);
  }

  function setEta(loaded, total) {
    if (!etaPanel) return;
    if (!uploadStartTs) uploadStartTs = Date.now();

    if (!etaPanel || etaPanel.style.display === 'none') etaPanel.style.display = 'block';

    const elapsedSec = (Date.now() - uploadStartTs) / 1000;
    const remainingBytes = Math.max(0, total - loaded);

    if (elapsedSec <= 0.05 || loaded <= 0) {
      etaCountdownEl && (etaCountdownEl.textContent = '--:--');
      etaSpeedEl && (etaSpeedEl.textContent = 'Calculating...');
      etaStatusEl && (etaStatusEl.textContent = 'Uploading...');
      if (etaStatusTextEl) etaStatusTextEl.textContent = 'Uploading...';
      if (etaStatusIconEl) etaStatusIconEl.style.opacity = '0.85';
      return;
    }


    const speedBytesPerSec = loaded / elapsedSec;
    if (!Number.isFinite(speedBytesPerSec) || speedBytesPerSec <= 0) {
      etaCountdownEl && (etaCountdownEl.textContent = '--:--');
      etaSpeedEl && (etaSpeedEl.textContent = 'Calculating...');
      etaStatusEl && (etaStatusEl.textContent = 'Uploading...');
      return;
    }

    const remainingSec = remainingBytes / speedBytesPerSec;
    etaCountdownEl && (etaCountdownEl.textContent = formatMMSS(remainingSec));

    // Lightweight speed label
    const mbps = bytesToMB(speedBytesPerSec);
    if (etaSpeedEl) {
      if (mbps >= 1) etaSpeedEl.textContent = `${mbps.toFixed(1)} MB/s`;
      else etaSpeedEl.textContent = `${(speedBytesPerSec / 1024).toFixed(0)} KB/s`;
    }
    if (etaStatusEl) etaStatusEl.textContent = 'Uploading...';
  }

  xhr.upload.onprogress = (e) => {
    if (!e.lengthComputable) {
      if (uploadProgressText) uploadProgressText.textContent = 'Uploading...';
      return;
    }

    const percent = Math.round((e.loaded / e.total) * 100);
    if (uploadProgressFill) uploadProgressFill.style.width = percent + '%';
    if (uploadProgressText) uploadProgressText.textContent = 'Uploading... ' + percent + '%';

    // ETA updates
    setEta(e.loaded, e.total);
  };

  let finished = false;

  function finalize(success, message, extra) {
    if (finished) return;
    finished = true;

    status.innerText = message;
    status.className = success ? 'status success' : 'status error';

    if (etaPanel) {
      // Strict ETA mm:ss (always 2-digit min/sec); failure shows --:--
      if (etaCountdownEl) etaCountdownEl.textContent = success ? '00:00' : '--:--';
      if (etaSpeedEl) etaSpeedEl.textContent = '';

      // Premium inline SVG status (replace any text/emoji indicators)
      if (etaStatusIconEl) etaStatusIconEl.style.opacity = success ? '0.95' : '0.95';
      if (etaStatusTextEl) etaStatusTextEl.textContent = success ? 'Upload Complete' : (extra?.failedLabel || 'Upload Failed');

      // Keep legacy element empty to avoid double indicators
      if (etaStatusEl) etaStatusEl.textContent = '';
    }


    if (uploadLoading) uploadLoading.style.display = 'none';
  }

  function safeReleaseWakeLock() {
    try {
      // release is intentionally best-effort; never affect UI outcome
      releaseWakeLock();
    } catch {}
  }

  xhr.onload = () => {
    console.log('🛠 /upload xhr.onload status=', xhr.status);
    console.log('🛠 /upload xhr.onload raw response:', xhr.responseText);

    // parse JSON safely
    let parsed = null;
    try {
      parsed = JSON.parse(xhr.responseText);
      console.log('🛠 /upload parsed JSON:', parsed);
    } catch (e) {
      parsed = null;
      console.log('🛠 /upload parsed JSON = null (invalid JSON)', e?.message || e);
    }

    // IMPORTANT: onload must be the FINAL decision point
    if (finished) return;

    if (xhr.status < 200 || xhr.status >= 300) {
      const msg = parsed?.error || 'Upload failed (server error)';
      finalize(false, msg, { parsed });
      safeReleaseWakeLock();
      return;
    }

    // 2xx: only treat as success when backend confirms success:true
    if (parsed && parsed.success === true) {
      finalize(true, 'Upload success!', { parsed });
      safeReleaseWakeLock();
      return;
    }

    // 2xx with invalid/missing response fields
    // show a more accurate message to avoid misleading server-error classification
    finalize(false, 'Upload completed but server response invalid', { parsed });
    safeReleaseWakeLock();
  };

  xhr.ontimeout = () => {
    if (finished) return;
    finalize(false, 'Upload timeout. Please try again.');
    safeReleaseWakeLock();
  };

  xhr.onerror = () => {
    if (finished) return;
    finalize(false, 'Network error. Check your connection.');
    safeReleaseWakeLock();
  };

  // Wake Lock (prevent screen sleep) - graceful fallback
  let wakeLock = null;

  async function enableWakeLock() {
    try {
      if ('wakeLock' in navigator && typeof navigator.wakeLock.request === 'function') {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (e) {
      console.warn('WakeLock failed:', e?.message || e);
    }
  }
  async function releaseWakeLock() {
    try {
      await wakeLock?.release?.();
    } catch {}
    wakeLock = null;
  }

  // enable only during upload
  enableWakeLock().finally(() => {
    xhr.send(formData);
  });
};


</script>
