services:
  streambox:
    build: .
    container_name: streambox
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      SD_BASE: /media
      HERO_BANNER_BASE: /media/hero banner
      LOG_DIR: /app/logs
      ENABLE_CSP: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./media:/media
    healthcheck:
      test: ["CMD", "node", "scripts/health-check.js", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
